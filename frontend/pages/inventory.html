<!DOCTYPE html>
<html>
<head>

    <title>Product Inventory</title>

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:'Segoe UI',sans-serif;
            padding:40px;
        }

        h1{
            text-align:center;
            margin-bottom:40px;
        }

        .inventory-grid{
            display:grid;

            grid-template-columns:
            repeat(auto-fit,minmax(250px,1fr));

            gap:20px;
        }

        .card{
            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(10px);

            border-radius:15px;

            padding:25px;

            text-align:center;

            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .price{
            color:#60a5fa;

            font-size:24px;

            font-weight:bold;
        }

    </style>

</head>

<body>

<h1>Product Inventory</h1>

<div
    id="inventoryContainer"
    class="inventory-grid">
</div>

<script>

const products = [

{
    product_id:1,
    product_name:"Rice",
    price:50,
    stock:120
},

{
    product_id:2,
    product_name:"Milk",
    price:30,
    stock:80
},

{
    product_id:3,
    product_name:"Bread",
    price:25,
    stock:65
},

{
    product_id:4,
    product_name:"Sugar",
    price:45,
    stock:95
},

{
    product_id:5,
    product_name:"Tea",
    price:120,
    stock:40
},

{
    product_id:6,
    product_name:"Coffee",
    price:180,
    stock:30
}

];

let html = "";

products.forEach(product =>
{
    html += `
    <div class="card">

        <h2>
            ${product.product_name}
        </h2>

        <p>
            Product ID :
            ${product.product_id}
        </p>

        <p>
            Available Stock :
            ${product.stock}
        </p>

        <div class="price">
            ₹${product.price}
        </div>

    </div>
    `;
});

document.getElementById(
    "inventoryContainer"
).innerHTML = html;

</script>

</body>
</html>
