<!DOCTYPE html>
<html>

<head>

    <title>Inventory</title>

    <link rel="stylesheet"
          href="../css/customer.css">

</head>

<body>

<h1>Product Inventory</h1>

<div id="inventoryContainer"
     class="container">

</div>

<script>

const API_URL =
"https://smart-supermarket-web.onrender.com";

async function loadInventory()
{
    try
    {
        const response =
        await fetch(
            `${API_URL}/products`
        );

        const products =
        await response.json();

        let html = "";

        products.forEach(product =>
        {
            html += `
            <div class="card">

                <h2>
                    ${product.product_name}
                </h2>

                <p>
                    Product ID :
                    ${product.product_id}
                </p>

                <h3>
                    ₹${product.price}
                </h3>

            </div>
            `;
        });

        document.getElementById(
            "inventoryContainer"
        ).innerHTML = html;
    }
    catch(error)
    {
        console.error(error);
    }
}

loadInventory();

</script>

</body>

</html>
