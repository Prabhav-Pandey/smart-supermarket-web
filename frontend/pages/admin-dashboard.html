<!DOCTYPE html>
<html>

<head>

    <title>Admin Dashboard</title>

    <link rel="stylesheet"
          href="../css/admin.css">

</head>

<body>

<h1>Admin Dashboard</h1>

<div class="container">

    <div class="card">

        <h2>Inventory</h2>

        <p>
            View product database.
        </p>

        <button
        onclick="
        window.location.href=
        'inventory.html'">
            Open
        </button>

    </div>

    <div class="card">

        <h2>Customer Feedback</h2>

        <p>
            Review submitted feedback.
        </p>

        <button
        onclick="
        window.location.href=
        'view-feedback.html'">
            Open
        </button>

    </div>

    <div class="card">

        <h2>System Statistics</h2>

        <p>
            Products and customer records.
        </p>

        <button>
            Statistics
        </button>

    </div>

    <div class="card">

        <h2>Logout</h2>

        <p>
            Exit admin panel.
        </p>

        <button
        onclick="logout()">
            Logout
        </button>

    </div>

</div>

<script src="../js/admin.js">
</script>

</body>

</html>
