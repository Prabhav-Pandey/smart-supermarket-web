<!DOCTYPE html>
<html>

<head>

    <title>Customer Dashboard</title>

    <link rel="stylesheet"
          href="../css/customer.css">

</head>

<body>

<h1>Customer Dashboard</h1>

<div class="container">

    <div class="card">

        <h2>Inventory</h2>

        <p>
            View available supermarket products.
        </p>

        <button
        onclick="
        window.location.href=
        'inventory.html'">
            Open
        </button>

    </div>

    <div class="card">

        <h2>Billing System</h2>

        <p>
            Generate bills instantly.
        </p>

        <button
        onclick="
        window.location.href=
        'billing.html'">
            Open
        </button>

    </div>

    <div class="card">

        <h2>Customer Feedback</h2>

        <p>
            Share your experience.
        </p>

        <button
        onclick="
        window.location.href=
        'feedback.html'">
            Open
        </button>

    </div>

    <div class="card">

        <h2>Logout</h2>

        <p>
            Exit the system safely.
        </p>

        <button
        onclick="logout()">
            Logout
        </button>

    </div>

</div>

<script src="../js/customer.js">
</script>

</body>

</html>
